<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - Estación Zúñiga</title>
    <style>
        :root {
            --azul: #007bff;
            --naranja: #ff9f43;
            --fondo: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fondo);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-volver {
            text-decoration: none;
            color: white;
            background: var(--azul);
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-block;
        }
        .calendario-full {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        #mes-titulo {
            color: var(--azul);
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: capitalize;
        }
        .grilla {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            text-align: center;
        }
        .nombre-dia {
            font-weight: bold;
            color: #666;
            font-size: 0.8rem;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .numero {
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: default;
            transition: 0.3s;
        }
        .numero:hover { background: #f0f0f0; }
        .hoy {
            background: var(--naranja) !important;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 159, 67, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-volver">← Volver a la Estación</a>
        <h1>Calendario Zúñiga</h1>
    </div>

    <div class="calendario-full">
        <div id="mes-titulo"></div>
        <div class="grilla">
            <div class="nombre-dia">LU</div><div class="nombre-dia">MA</div>
            <div class="nombre-dia">MI</div><div class="nombre-dia">JU</div>
            <div class="nombre-dia">VI</div><div class="nombre-dia">SA</div>
            <div class="nombre-dia">DO</div>
        </div>
        <div id="numeros-contenedor" class="grilla"></div>
    </div>

    <script>
        function generarCalendario() {
            const fecha = new Date();
            const titulo = document.getElementById('mes-titulo');
            const contenedor = document.getElementById('numeros-contenedor');

            const opciones = { month: 'long', year: 'numeric' };
            titulo.innerText = fecha.toLocaleDateString('es-AR', opciones);

            const año = fecha.getFullYear();
            const mes = fecha.getMonth();
            const primerDia = new Date(año, mes, 1).getDay();
            const ultimoDia = new Date(año, mes + 1, 0).getDate();

            const desfase = (primerDia === 0) ? 6 : primerDia - 1;

            for (let i = 0; i < desfase; i++) {
                contenedor.innerHTML += `<div></div>`;
            }

            for (let dia = 1; dia <= ultimoDia; dia++) {
                let claseHoy = (dia === fecha.getDate()) ? 'hoy' : '';
                contenedor.innerHTML += `<div class="numero ${claseHoy}">${dia}</div>`;
            }
        }
        generarCalendario();
    </script>
</body>
</html>
