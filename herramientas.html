<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramientas - Estación Zúñiga</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: var(--accent-color); }
        .alert-box {
            background-color: #fff3cd;
            border-left: 5px solid #ffecb5;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-weight: bold;
        }
        .input-group {
            margin: 15px 0;
            text-align: left;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover { background-color: #2980b9; }
        .result {
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: #e67e22;
        }
        .btn-back {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: var(--primary-color);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Panel de Herramientas</h1>
    
    <!-- Sección de Alertas (Manual) -->
    <div class="alert-box" id="alert-display">
        ⚠️ <strong>Aviso Local:</strong> No hay alertas vigentes para San Martín en este momento.
    </div>

    <hr>

    <h3>Calculadora de Sensación Térmica</h3>
    <p>Ingresá los datos para saber cuánto se siente realmente el frío o el calor.</p>
    
    <div class="input-group">
        <label>Temperatura (°C):</label>
        <input type="number" id="temp" placeholder="Ej: 32">
    </div>
    
    <div class="input-group">
        <label>Humedad (%):</label>
        <input type="number" id="hum" placeholder="Ej: 60">
    </div>

    <button onclick="calcularST()">Calcular Sensación</button>

    <div class="result" id="resultadoST"></div>

    <a href="index.html" class="btn-back">⬅ Volver a la Estación Principal</a>
</div>

<script>
    function calcularST() {
        const T = parseFloat(document.getElementById('temp').value);
        const H = parseFloat(document.getElementById('hum').value);
        const res = document.getElementById('resultadoST');

        if (isNaN(T) || isNaN(H)) {
            res.innerHTML = "Por favor, completa ambos campos.";
            return;
        }

        let st;
        // Fórmula simplificada de Sensación Térmica
        if (T >= 27) {
            // Índice de Calor para temperaturas altas
            st = -8.78469475556 + 1.61139411 * T + 2.33854883889 * H - 0.183062721 * T * H - 0.00916045477 * T * T - 0.012308094 * H * H + 0.002211732 * T * T * H + 0.00102554 * T * H * H - 0.0000038646 * T * T * H * H;
        } else if (T <= 10) {
            // Wind Chill no aplica sin viento, pero mostramos un mensaje
            st = T; // Simplificación si no hay viento
            res.innerHTML = `La sensación es de ${T.toFixed(1)}°C (Para frío extremo se requiere dato de viento).`;
            return;
        } else {
            st = T;
        }

        res.innerHTML = `La Sensación Térmica es de: ${st.toFixed(1)}°C`;
    }

    // Aquí puedes cambiar el texto manualmente cuando quieras publicar una alerta
    const miAlerta = "⚠️ ATENCIÓN: Probabilidad de viento Zonda para mañana en la tarde.";
    // Descomenta la línea de abajo para activar una alerta real
    // document.getElementById('alert-display').innerHTML = miAlerta;
</script>

</body>
</html>
