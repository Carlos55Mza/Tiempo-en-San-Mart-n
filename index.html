<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zúñiga Smart Station 🛰️</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { --glass: rgba(255, 255, 255, 0.12); --accent: #FFD700; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: #111 no-repeat center center fixed; background-size: cover; 
            color: white; overflow-x: hidden; transition: background 1s ease-in-out;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.55); z-index: 1; }

        .wrapper { 
            position: relative; z-index: 10; width: 95%; max-width: 400px; 
            margin: 20px auto 0; text-align: center; display: flex; flex-direction: column; align-items: center;
        }

        #clock { font-size: 3.2rem; font-weight: 700; margin: 0; letter-spacing: -2px; }
        #date { font-size: 0.8rem; text-transform: uppercase; opacity: 0.8; margin-bottom: 10px; }

        .info-container {
            display: grid; grid-template-columns: 1fr 1.3fr; gap: 10px;
            width: 100%; margin: 10px 0;
        }

        .weather-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
            padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .temp-val { font-size: 3rem; font-weight: 800; margin: 0; }
        .weather-icon { font-size: 35px !important; color: var(--accent); }

        .news-box {
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
            display: flex; flex-direction: column; overflow: hidden;
            text-decoration: none; color: white; transition: transform 0.3s;
        }
        #news-img { width: 100%; height: 70px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.1); transition: opacity 0.5s; }
        .news-content { padding: 8px 10px; text-align: left; }
        .news-tag { font-size: 0.55rem; color: var(--accent); font-weight: 900; text-transform: uppercase; margin-bottom: 2px; }
        #news-text { font-size: 0.7rem; line-height: 1.2; font-weight: 500; height: 32px; overflow: hidden; transition: opacity 0.5s; }

        /* GRILLA COMPLETA DE 10 BOTONES */
        .services-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; 
            width: 100%; box-sizing: border-box; padding-bottom: 110px;
        }
        .service-item {
            display: flex; flex-direction: row; align-items: center; 
            text-decoration: none; color: white; background: var(--glass); 
            padding: 10px 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); 
            box-sizing: border-box; transition: 0.2s;
        }
        .service-item:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        .service-item span { font-size: 18px !important; margin-right: 10px; }
        .service-label { font-size: 9px; font-weight: 700; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .bottom-dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10,10,10,0.85); padding: 10px 25px; border-radius: 30px; 
            display: flex; gap: 25px; border: 1px solid rgba(255,255,255,0.2); z-index: 100;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="wrapper">
        <div id="clock">00:00</div>
        <div id="date">--</div>

        <div class="info-container">
            <div class="weather-card">
                <span class="material-symbols-outlined weather-icon" id="icon">cloud_sync</span>
                <div class="temp-val"><span id="temp">--</span>°</div>
                <div id="desc" style="font-size: 0.55rem; font-weight: 800;">ACTUALIZANDO</div>
            </div>

            <a href="https://news.google.com/search?q=Mendoza" target="_blank" class="news-box" id="news-link">
                <img src="" id="news-img" alt="Noticia">
                <div class="news-content">
                    <div class="news-tag" id="news-category">ACTUALIDAD</div>
                    <div id="news-text">Cargando noticias...</div>
                </div>
            </a>
        </div>

        <div class="services-grid">
            <!-- 1. PROMIEDOS -->
            <a href="https://www.promiedos.com.ar/" target="_blank" class="service-item">
                <span class="material-symbols-outlined" style="color:#51cf66">trophy</span><span class="service-label">Promiedos</span>
            </a>
            <!-- 2. CHACARERO -->
            <a href="https://mendozagol.com.ar/equipo/atletico-club-san-martin/" target="_blank" class="service-item">
                <span class="material-symbols-outlined" style="color:#fa5252">sports_soccer</span><span class="service-label">Chacarero</span>
            </a>
            <!-- 3. SISMOS -->
            <a href="https://www.inpres.gob.ar/" target="_blank" class="service-item">
                <span class="material-symbols-outlined" style="color:#fcc419">shiver</span><span class="service-label">Sismos</span>
            </a>
            <!-- 4. RADAR -->
            <a href="https://www.mendoza.gov.ar/contingencias/radar/" target="_blank" class="service-item">
                <span class="material-symbols-outlined" style="color:#fab005">radar</span><span class="service-label">Radar Granizo</span>
            </a>
            <!-- 5. RECETAS -->
            <a href="https://cookpad.com/ar/buscar/facil%20y%20rapido" target="_blank" class="service-item" style="background: rgba(255, 107, 107, 0.15);">
                <span class="material-symbols-outlined" style="color:#ff6b6b">restaurant_menu</span><span class="service-label">Receta Mamá</span>
            </a>
            <!-- 6. RADIO (LINK NUEVO) -->
            <a href="https://myradioenvivo.ar/" target="_blank" class="service-item">
                <span class="material-symbols-outlined" style="color:#ff922b">radio</span><span class="service-label">Radio en Vivo</span>
            </a>
            <!-- 7. PAGOS -->
            <a href="https://pagomiscuentas.com/" target="_blank" class="service-item">
                <span class="material-symbols-outlined" style="color:#4dabf7">payments</span><span class="service-label">Pagos</span>
            </a>
            <!-- 8. ANSES -->
            <a href="https://www.anses.gob.ar/" target="_blank" class="service-item">
                <span class="material-symbols-outlined" style="color:#74c0fc">account_balance</span><span class="service-label">ANSES</span>
            </a>
            <!-- 9. AFIP -->
            <a href="https://www.afip.gob.ar/" target="_blank" class="service-item">
                <span class="material-symbols-outlined" style="color:#63e6be">description</span><span class="service-label">AFIP</span>
            </a>
            <!-- 10. PASO A CHILE -->
            <a href="https://x.com/PasoCRMza" target="_blank" class="service-item">
                <span class="material-symbols-outlined" style="color:#339af0">mountain_flag</span><span class="service-label">Paso a Chile</span>
            </a>
        </div>
    </div>

    <div class="bottom-dock">
        <a href="https://wa.me/" target="_blank" style="color:white"><span class="material-symbols-outlined">chat</span></a>
        <a href="https://www.google.com.ar/maps/search/estaciones+de+servicio" target="_blank" style="color:white"><span class="material-symbols-outlined">local_gas_station</span></a>
        <a href="tel:911" style="color:#ff4b2b"><span class="material-symbols-outlined">emergency</span></a>
    </div>

    <script>
        const news = [
            { cat: "MENDOZA", txt: "Vientos en Alta Montaña: recomiendan precaución.", img: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=300", url: "https://news.google.com/search?q=Mendoza" },
            { cat: "FÚTBOL", txt: "San Martín prepara su estrategia para el fin de semana.", img: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=300", url: "https://www.promiedos.com.ar" },
            { cat: "ECONOMÍA", txt: "Cotización del día: seguí el valor del dólar en Mendoza.", img: "https://images.unsplash.com/photo-1580519542036-c47de6196ba5?auto=format&fit=crop&w=300", url: "https://www.diariouno.com.ar/economia" },
            { cat: "NACIONAL", txt: "ANSES informa nuevas fechas de cobro para beneficios.", img: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&w=300", url: "https://www.anses.gob.ar" }
        ];

        let newsIndex = 0;
        function rotateNews() {
            const textEl = document.getElementById('news-text');
            const catEl = document.getElementById('news-category');
            const imgEl = document.getElementById('news-img');
            const linkEl = document.getElementById('news-link');
            
            textEl.style.opacity = 0; imgEl.style.opacity = 0;
            setTimeout(() => {
                catEl.innerText = news[newsIndex].cat;
                textEl.innerText = news[newsIndex].txt;
                imgEl.src = news[newsIndex].img;
                linkEl.href = news[newsIndex].url;
                textEl.style.opacity = 1; imgEl.style.opacity = 1;
                newsIndex = (newsIndex + 1) % news.length;
            }, 500);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        async function updateWeather() {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=San Martin,AR&units=metric&lang=es&appid=e8249e08c3e546966e2e394e0485e7ec`);
                const data = await res.json();
                document.getElementById('temp').innerText = Math.round(data.main.temp);
                document.getElementById('desc').innerText = data.weather[0].description.toUpperCase();
                const clima = data.weather[0].main;
                const bgUrls = { Clear: "https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=1600", Clouds: "https://images.unsplash.com/photo-1534088568595-a066f410bcda?auto=format&fit=crop&w=1600", Rain: "https://images.unsplash.com/photo-1433838552652-f9a46b332c40?auto=format&fit=crop&w=1600" };
                document.body.style.backgroundImage = `url('${bgUrls[clima] || bgUrls.Clear}')`;
                const iconos = { Clear: "wb_sunny", Clouds: "cloud", Rain: "rainy", Thunderstorm: "thunderstorm", Mist: "filter_drama" };
                document.getElementById('icon').innerText = iconos[clima] || "wb_cloudy";
            } catch (e) { console.log(e); }
        }

        setInterval(updateClock, 1000);
        setInterval(rotateNews, 10000);
        setInterval(updateWeather, 900000);
        updateClock(); updateWeather(); rotateNews();
    </script>
</body>
</html>
