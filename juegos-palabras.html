<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juegos de Palabras</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Righteous&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1eb;
    --surface: #fffdf8;
    --accent: #e85d26;
    --accent2: #2e86ab;
    --green: #3cb371;
    --text: #1a1a2e;
    --muted: #888;
    --border: #d9d3c5;
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 3rem;
  }
  header {
    background: var(--text);
    color: #fff;
    padding: 1.5rem 2rem;
    text-align: center;
  }
  header h1 {
    font-family: 'Righteous', cursive;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    letter-spacing: 0.03em;
  }
  header p { font-size: 0.95rem; opacity: 0.6; margin-top: 4px; }

  .tab-bar {
    display: flex;
    justify-content: center;
    gap: 0;
    background: var(--text);
    padding: 0 2rem 1rem;
  }
  .tab-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 10px 28px;
    border: none;
    cursor: pointer;
    border-radius: 30px;
    background: transparent;
    color: rgba(255,255,255,0.5);
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .tab-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .container { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* === SOPA === */
  .sopa-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  #sopa-grid {
    display: inline-grid;
    gap: 4px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: 4px 4px 0px var(--border);
    user-select: none;
  }
  .cell {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: #fff;
    transition: background 0.1s, transform 0.1s;
    color: var(--text);
  }
  .cell.selected { background: #fde8b8; border-color: #e8a020; transform: scale(1.08); }
  .cell.found { background: #c8f0d8; border-color: var(--green); color: #1a5c35; }

  .words-list {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    max-width: 500px;
  }
  .word-chip {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px; font-weight: 700;
    background: #fff;
    border: 1.5px solid var(--border);
    color: var(--text);
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .word-chip.found {
    background: #c8f0d8;
    border-color: var(--green);
    color: #1a5c35;
    text-decoration: line-through;
  }

  /* === CRUCIGRAMA === */
  .cruz-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  #cruz-grid {
    display: inline-grid;
    gap: 3px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: 4px 4px 0px var(--border);
  }
  .cruz-cell { width: 36px; height: 36px; position: relative; }
  .cruz-cell.black {
    background: var(--text);
    border-radius: 4px;
  }
  .cruz-cell input {
    width: 100%; height: 100%;
    text-align: center;
    font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 700;
    text-transform: uppercase;
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--text);
    border-radius: 4px;
    padding: 0;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .cruz-cell input:focus { border-color: var(--accent2); background: #e8f4fb; }
  .cruz-cell input.correct { background: #c8f0d8; border-color: var(--green); color: #1a5c35; }
  .cruz-cell input.wrong { background: #ffe0db; border-color: var(--accent); color: #8c2010; }
  .num-badge {
    position: absolute; top: 2px; left: 3px;
    font-size: 8px; font-weight: 800;
    color: var(--muted);
    pointer-events: none; line-height: 1; z-index: 1;
  }

  .clues-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    width: 100%; max-width: 700px;
    box-shadow: 4px 4px 0px var(--border);
  }
  .clues { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .clue-group h3 {
    font-size: 12px; font-weight: 800;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 4px;
  }
  .clue-item {
    font-size: 13px; margin-bottom: 6px;
    cursor: pointer; padding: 4px 6px;
    border-radius: 6px; line-height: 1.4;
    transition: background 0.15s;
  }
  .clue-item:hover { background: var(--bg); }
  .clue-item.done { color: var(--muted); text-decoration: line-through; }
  .clue-num { font-weight: 800; color: var(--accent2); margin-right: 2px; }

  /* Botones */
  .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 0.5rem; }
  .btn {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700;
    padding: 8px 20px;
    border-radius: 30px;
    border: 1.5px solid var(--text);
    background: #fff;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn:hover { background: var(--text); color: #fff; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { opacity: 0.85; }

  .status-msg {
    font-size: 14px; font-weight: 700;
    color: var(--muted);
    text-align: center;
    min-height: 22px;
  }
  .win-msg { color: var(--green); font-size: 16px; }

  @media (max-width: 520px) {
    .clues { grid-template-columns: 1fr; }
    .cell { width: 28px; height: 28px; font-size: 12px; }
    .cruz-cell { width: 30px; height: 30px; }
    .cruz-cell input { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <h1>🎮 Juegos de Palabras</h1>
  <p>Sopa de letras · Crucigrama</p>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('sopa')">Sopa de letras</button>
  <button class="tab-btn" onclick="switchTab('cruz')">Crucigrama</button>
</div>

<div class="container">

  <!-- SOPA DE LETRAS -->
  <div id="panel-sopa" class="panel active">
    <div class="sopa-wrap">
      <div id="sopa-grid"></div>
      <div class="words-list" id="words-list"></div>
      <div class="actions">
        <button class="btn primary" onclick="initSopa()">🔄 Nueva partida</button>
      </div>
      <div class="status-msg" id="sopa-status"></div>
    </div>
  </div>

  <!-- CRUCIGRAMA -->
  <div id="panel-cruz" class="panel">
    <div class="cruz-wrap">
      <div id="cruz-grid"></div>
      <div class="clues-box">
        <div class="clues" id="clues"></div>
      </div>
      <div class="actions">
        <button class="btn" onclick="checkCruz()">✅ Verificar</button>
        <button class="btn" onclick="revealCruz()">💡 Revelar</button>
        <button class="btn primary" onclick="initCruz()">🔄 Nueva partida</button>
      </div>
      <div class="status-msg" id="cruz-status"></div>
    </div>
  </div>

</div>

<script>
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='sopa')||(i===1&&t==='cruz')));
  document.getElementById('panel-sopa').classList.toggle('active',t==='sopa');
  document.getElementById('panel-cruz').classList.toggle('active',t==='cruz');
}

// ========== SOPA DE LETRAS ==========
const SOPA_WORDS = ['LUNA','SOL','MAR','CIELO','VIENTO','TIERRA','FUEGO','AGUA','NUBE','RIO','ESTRELLA','FLOR'];
const SOPA_SIZE = 13;
let sopaGrid=[], sopaPlaced=[], sopaSelected=[], sopaFoundWords=new Set();
let isDragging=false;

function initSopa(){
  sopaGrid=Array.from({length:SOPA_SIZE},()=>Array(SOPA_SIZE).fill(''));
  sopaPlaced=[]; sopaFoundWords=new Set(); sopaSelected=[];
  const words=[...SOPA_WORDS].sort(()=>Math.random()-0.5).slice(0,9);
  const dirs=[[0,1],[1,0],[1,1],[0,-1],[-1,0],[-1,-1],[1,-1],[-1,1]];
  words.forEach(w=>{
    let placed=false,tries=0;
    while(!placed&&tries<300){
      tries++;
      const [dr,dc]=dirs[Math.floor(Math.random()*dirs.length)];
      const r=Math.floor(Math.random()*SOPA_SIZE);
      const c=Math.floor(Math.random()*SOPA_SIZE);
      const er=r+dr*(w.length-1),ec=c+dc*(w.length-1);
      if(er<0||er>=SOPA_SIZE||ec<0||ec>=SOPA_SIZE) continue;
      let ok=true;
      for(let i=0;i<w.length;i++) if(sopaGrid[r+dr*i][c+dc*i]&&sopaGrid[r+dr*i][c+dc*i]!==w[i]){ok=false;break;}
      if(ok){for(let i=0;i<w.length;i++) sopaGrid[r+dr*i][c+dc*i]=w[i]; sopaPlaced.push({word:w,r,c,dr,dc}); placed=true;}
    }
  });
  const alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let r=0;r<SOPA_SIZE;r++) for(let c=0;c<SOPA_SIZE;c++) if(!sopaGrid[r][c]) sopaGrid[r][c]=alpha[Math.floor(Math.random()*alpha.length)];
  renderSopa(sopaPlaced.map(p=>p.word));
}

function renderSopa(words){
  const g=document.getElementById('sopa-grid');
  g.style.gridTemplateColumns=`repeat(${SOPA_SIZE},34px)`;
  g.innerHTML='';
  for(let r=0;r<SOPA_SIZE;r++) for(let c=0;c<SOPA_SIZE;c++){
    const el=document.createElement('div');
    el.className='cell'; el.textContent=sopaGrid[r][c];
    el.dataset.r=r; el.dataset.c=c;
    el.addEventListener('mousedown',e=>{isDragging=true;sopaSelected=[[r,c]];renderCells();e.preventDefault();});
    el.addEventListener('mouseover',()=>{if(isDragging){extendSelect(r,c);renderCells();}});
    el.addEventListener('mouseup',()=>{if(isDragging){isDragging=false;checkSopaWord();}});
    el.addEventListener('touchstart',e=>{isDragging=true;sopaSelected=[[r,c]];renderCells();e.preventDefault();},{passive:false});
    el.addEventListener('touchmove',e=>{
      const t=e.touches[0],el2=document.elementFromPoint(t.clientX,t.clientY);
      if(el2&&el2.classList.contains('cell')){extendSelect(+el2.dataset.r,+el2.dataset.c);renderCells();}
      e.preventDefault();
    },{passive:false});
    el.addEventListener('touchend',()=>{if(isDragging){isDragging=false;checkSopaWord();}});
    g.appendChild(el);
  }
  const wl=document.getElementById('words-list');
  wl.innerHTML='';
  words.forEach(w=>{const ch=document.createElement('span');ch.className='word-chip';ch.textContent=w;ch.id='chip-'+w;wl.appendChild(ch);});
  document.getElementById('sopa-status').textContent='';
}

function extendSelect(r,c){
  if(!sopaSelected.length){sopaSelected=[[r,c]];return;}
  const [r0,c0]=sopaSelected[0];
  const dr=r-r0,dc=c-c0,len=Math.max(Math.abs(dr),Math.abs(dc));
  if(len===0){sopaSelected=[[r0,c0]];return;}
  let sr=dr?dr/Math.abs(dr):0,sc=dc?dc/Math.abs(dc):0;
  if(Math.abs(dr)!==Math.abs(dc)&&dr!==0&&dc!==0) return;
  sopaSelected=[];
  for(let i=0;i<=len;i++) sopaSelected.push([r0+sr*i,c0+sc*i]);
}

function renderCells(){
  document.querySelectorAll('.cell').forEach(el=>{
    const r=+el.dataset.r,c=+el.dataset.c;
    const isSel=sopaSelected.some(([sr,sc])=>sr===r&&sc===c);
    const isFound=sopaPlaced.some(p=>{
      if(!sopaFoundWords.has(p.word)) return false;
      for(let i=0;i<p.word.length;i++) if(p.r+p.dr*i===r&&p.c+p.dc*i===c) return true;
      return false;
    });
    el.className='cell'+(isFound?' found':isSel?' selected':'');
  });
}

function checkSopaWord(){
  const letters=sopaSelected.map(([r,c])=>sopaGrid[r][c]).join('');
  const rev=letters.split('').reverse().join('');
  const matched=sopaPlaced.find(p=>p.word===letters||p.word===rev);
  if(matched&&!sopaFoundWords.has(matched.word)){
    sopaFoundWords.add(matched.word);
    const chip=document.getElementById('chip-'+matched.word);
    if(chip) chip.className='word-chip found';
    if(sopaFoundWords.size===sopaPlaced.length)
      document.getElementById('sopa-status').innerHTML='<span class="win-msg">🎉 ¡Encontraste todas las palabras!</span>';
  }
  sopaSelected=[];
  renderCells();
}

// ========== CRUCIGRAMA ==========
const CRUZ_DATA={
  size:9,
  words:[
    {word:'ELEFANTE',r:0,c:0,dir:'h',num:1,clue:'Animal más grande de tierra'},
    {word:'ESPANA',  r:0,c:0,dir:'v',num:1,clue:'País de flamenco y paella'},
    {word:'LIBRO',   r:2,c:3,dir:'h',num:2,clue:'Objeto para leer historias'},
    {word:'LUNA',    r:0,c:6,dir:'v',num:3,clue:'Satélite natural de la Tierra'},
    {word:'ARTE',    r:4,c:0,dir:'h',num:4,clue:'Expresión creativa humana'},
    {word:'NARIZ',   r:3,c:4,dir:'v',num:5,clue:'Órgano del olfato'},
    {word:'TIGRE',   r:6,c:2,dir:'h',num:6,clue:'Felino de rayas anaranjadas'},
    {word:'NIEVE',   r:4,c:8,dir:'v',num:7,clue:'Agua congelada que cae del cielo'},
  ]
};

function initCruz(){
  const grid=document.getElementById('cruz-grid');
  grid.style.gridTemplateColumns=`repeat(${CRUZ_DATA.size},36px)`;
  grid.innerHTML='';
  const cells={},numbers={};
  CRUZ_DATA.words.forEach(({word,r,c,dir,num})=>{
    for(let i=0;i<word.length;i++){
      const cr=dir==='h'?r:r+i,cc=dir==='h'?c+i:c,key=cr+','+cc;
      cells[key]=word[i];
      if(i===0) numbers[key]=(numbers[key]||new Set()).add(num);
    }
  });
  for(let r=0;r<CRUZ_DATA.size;r++) for(let c=0;c<CRUZ_DATA.size;c++){
    const d=document.createElement('div');d.className='cruz-cell';
    const key=r+','+c;
    if(cells[key]){
      if(numbers[key]){const nb=document.createElement('span');nb.className='num-badge';nb.textContent=[...numbers[key]].join('/');d.appendChild(nb);}
      const inp=document.createElement('input');
      inp.maxLength=1;inp.dataset.r=r;inp.dataset.c=c;inp.dataset.ans=cells[key];inp.id='ci-'+key;
      inp.addEventListener('input',()=>{inp.value=inp.value.toUpperCase().slice(-1);inp.className='';moveFocus(r,c,inp.value);});
      inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!inp.value) moveFocusBack(r,c);});
      d.appendChild(inp);
    } else { d.classList.add('black'); }
    grid.appendChild(d);
  }
  document.getElementById('cruz-status').textContent='';
  renderClues();
}

function moveFocus(r,c,val){
  if(!val) return;
  for(const[nr,nc] of [[r,c+1],[r+1,c]]){const el=document.getElementById('ci-'+nr+','+nc);if(el){el.focus();break;}}
}
function moveFocusBack(r,c){
  for(const[nr,nc] of [[r,c-1],[r-1,c]]){const el=document.getElementById('ci-'+nr+','+nc);if(el){el.focus();break;}}
}

function renderClues(){
  const cl=document.getElementById('clues');
  const across=CRUZ_DATA.words.filter(w=>w.dir==='h');
  const down=CRUZ_DATA.words.filter(w=>w.dir==='v');
  cl.innerHTML=`
    <div><h3>→ Horizontal</h3>${across.map(w=>`<div class="clue-item" id="clue-h-${w.num}"><span class="clue-num">${w.num}.</span> ${w.clue}</div>`).join('')}</div>
    <div><h3>↓ Vertical</h3>${down.map(w=>`<div class="clue-item" id="clue-v-${w.num}"><span class="clue-num">${w.num}.</span> ${w.clue}</div>`).join('')}</div>
  `;
}

function checkCruz(){
  let correct=0,total=0,allDone=true;
  CRUZ_DATA.words.forEach(({word,r,c,dir,num})=>{
    let wordOk=true;
    for(let i=0;i<word.length;i++){
      const cr=dir==='h'?r:r+i,cc=dir==='h'?c+i:c;
      const inp=document.getElementById('ci-'+cr+','+cc);
      if(!inp) continue; total++;
      if(inp.value===inp.dataset.ans){inp.className='correct';correct++;}
      else{inp.className='wrong';wordOk=false;allDone=false;}
    }
    const clueEl=document.getElementById('clue-'+(dir==='h'?'h':'v')+'-'+num);
    if(clueEl) clueEl.classList.toggle('done',wordOk);
  });
  const st=document.getElementById('cruz-status');
  if(allDone) st.innerHTML='<span class="win-msg">🎉 ¡Crucigrama completo!</span>';
  else st.textContent=`✔ ${correct} de ${total} letras correctas.`;
}

function revealCruz(){
  CRUZ_DATA.words.forEach(({word,r,c,dir})=>{
    for(let i=0;i<word.length;i++){
      const cr=dir==='h'?r:r+i,cc=dir==='h'?c+i:c;
      const inp=document.getElementById('ci-'+cr+','+cc);
      if(inp){inp.value=word[i];inp.className='correct';}
    }
  });
  document.getElementById('cruz-status').innerHTML='<span class="win-msg">💡 Respuestas reveladas.</span>';
  document.querySelectorAll('.clue-item').forEach(el=>el.classList.add('done'));
}

document.addEventListener('mouseup',()=>{if(isDragging){isDragging=false;checkSopaWord();}});
initSopa();
initCruz();
</script>
</body>
</html>
